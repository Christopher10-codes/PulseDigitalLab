<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Get Your Free Thatch Quote</title>
  <!-- Canvas Confetti Library for Submit Effect -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* Global Styles & Variables */
    :root {
      --accent-color: #25d366; /* WhatsApp Green Accent */
      --accent-gradient: linear-gradient(135deg, #25d366, #128c7e);
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --input-border: #cbd5e1;
      --shadow-color: rgba(37, 211, 102, 0.2);
      --transition-speed: 0.3s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: #f4f6f8;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Animated Card Container */
    .form-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Live Progress Bar */
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent-gradient);
      transition: width 0.3s ease;
    }

    /* Header */
    .form-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }

    .form-header p {
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
    }

    /* Field Group Styling */
    .field-group {
      margin-bottom: 18px;
      position: relative;
    }

    .field-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    /* Interactive Inputs & Select Dropdown */
    .input-control {
      width: 100%;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 2px solid var(--input-border);
      border-radius: 10px;
      outline: none;
      background: #fafafa;
      transition: all 0.25s ease;
      color: var(--text-main);
    }

    .input-control:focus {
      border-color: var(--accent-color);
      background: #ffffff;
      box-shadow: 0 0 0 4px var(--shadow-color);
      transform: scale(1.01);
    }

    select.input-control {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%3c64748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 16px;
    }

    textarea.input-control {
      resize: vertical;
      min-height: 90px;
    }

    /* WhatsApp Button Layout & Styling */
    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--accent-gradient);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 8px 16px var(--shadow-color);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .submit-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px var(--shadow-color);
    }

    .submit-btn:active {
      transform: translateY(1px);
    }

    /* Success Screen State */
    .success-card {
      display: none;
      text-align: center;
      padding: 20px 0;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
  <script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');
fbq('init', '1691705598716478');
fbq('track', 'PageView');
</script>
<noscript><img height="1" width="1" style="display:none"
src="https://www.facebook.com/tr?id=1691705598716478&ev=PageView&noscript=1"
/></noscript>
<!-- End Meta Pixel Code -->
</head>
<body>

  <div class="form-card" id="formCard">
    <!-- Progress Indicator -->
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Main Lead Form -->
    <form id="quoteForm">
      <div class="form-header">
        <h2>Please fill out this form to get your free quote</h2>
        <p>Takes less than 30 seconds. Fast response guaranteed.</p>
      </div>

      <!-- 1. Full Name -->
      <div class="field-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" class="input-control" placeholder="e.g. John Smith" required />
      </div>

      <!-- 2. Phone / WhatsApp -->
      <div class="field-group">
        <label for="phone">Phone / WhatsApp Number</label>
        <input type="tel" id="phone" class="input-control" placeholder="e.g. 082 123 4567" required />
      </div>

      <!-- 3. Service Needed -->
      <div class="field-group">
        <label for="service">Service Needed</label>
        <select id="service" class="input-control" required>
          <option value="" disabled selected>Select a service...</option>
          <option value="Thatch Roof Repair / Leak Fix">Thatch Roof Repair / Leak Fix</option>
          <option value="New Thatch Installation / Lapa Build">New Thatch Installation / Lapa Build</option>
          <option value="Harvey Thatch Tiles Installation">Harvey Thatch Tiles Installation</option>
          <option value="Maintenance & Combing">Maintenance & Combing</option>
        </select>
      </div>

      <!-- 4. Suburb / Area -->
      <div class="field-group">
        <label for="suburb">Your Suburb / Area</label>
        <input type="text" id="suburb" class="input-control" placeholder="e.g. Sandton, Pretoria" required />
      </div>

      <!-- 5. Message Field -->
      <div class="field-group">
        <label for="message">Message / Project Details</label>
        <textarea id="message" class="input-control" placeholder="Tell us briefly about the repair or project..."></textarea>
      </div>

      <!-- WhatsApp Button -->
      <button type="submit" class="submit-btn" id="submitBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
          <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3 18.6-68.1-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
        </svg>
        Get My Free Quote
      </button>
    </form>

    <!-- Success Screen -->
    <div class="success-card" id="successCard">
      <h2>Quote Request Received!</h2>
      <p style="color: var(--text-muted); margin-top: 8px;">Opening WhatsApp to finalize your quote...</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('quoteForm');
    const inputs = form.querySelectorAll('.input-control');
    const progressBar = document.getElementById('progressBar');

    // Real-Time Progress Bar Animation
    function updateProgress() {
      let filledCount = 0;
      const totalFields = 4; // Name, Phone, Service Dropdown, Suburb

      if (document.getElementById('fullName').value.trim() !== '') filledCount++;
      if (document.getElementById('phone').value.trim() !== '') filledCount++;
      if (document.getElementById('service').value !== '') filledCount++;
      if (document.getElementById('suburb').value.trim() !== '') filledCount++;

      const progress = (filledCount / totalFields) * 100;
      progressBar.style.width = `${progress}%`;
    }

    // Attach input & change listeners for live progress update
    inputs.forEach(input => {
      input.addEventListener('input', updateProgress);
      input.addEventListener('change', updateProgress);
    });

    // Form Submit & WhatsApp Routing
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      // Collect field values
      const name = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const service = document.getElementById('service').value;
      const suburb = document.getElementById('suburb').value.trim();
      const message = document.getElementById('message').value.trim() || 'N/A';

      // Target WhatsApp Number
      const whatsappNumber = "27738394257";

      // Build Formatted WhatsApp Message
      const formattedMessage = 
`*New Quote Request*

*Full Name:* ${name}
*Phone Number:* ${phone}
*Service Needed:* ${service}
*Suburb / Area:* ${suburb}
*Message / Project Details:* ${message}`;

      // Encode URL message
      const encodedMessage = encodeURIComponent(formattedMessage);
      const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;

      // Confetti Effect
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 }
      });

      // Show Success View
      form.style.display = 'none';
      document.getElementById('successCard').style.display = 'block';

      // Redirect to WhatsApp after brief delay
      setTimeout(() => {
        window.open(whatsappURL, '_blank');
      }, 1000);
    });
  </script>
</body>
</html>
